<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Autoridades - Seguridad Pública Zaragoza</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a237e, #0d47a1);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }

        .login-box {
            background: white;
            padding: 3rem 2rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header i {
            font-size: 4rem;
            color: #1a237e;
            margin-bottom: 1rem;
        }

        .login-header h2 {
            color: #1a237e;
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
        }

        .login-header p {
            color: #666;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 500;
        }

        .form-group label i {
            color: #1a237e;
            margin-right: 0.5rem;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: #1a237e;
            box-shadow: 0 0 0 3px rgba(26,35,126,0.1);
        }

        /* --- NUEVO ESTILO PARA EL CONTENEDOR DE CONTRASEÑA Y EL BOTÓN DE OJO --- */
        .password-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .password-container .form-control {
            flex: 1; /* Hace que el input tome el espacio sobrante */
        }
        
        .btn-eye {
            background: #f1f5f9;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            color: #64748b;
            padding: 0.75rem 1rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s;
            font-size: 1.1rem;
        }
        
        .btn-eye:hover {
            background: #e2e8f0;
            color: #1a237e;
        }
        
        .btn-eye:focus {
            outline: none;
            border-color: #1a237e;
        }
        /* --------------------------------------------------------------------- */

        .btn {
            width: 100%;
            padding: 1rem;
            background: #1a237e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #0d47a1;
        }

        .btn:disabled {
            background: #9fa8da;
            cursor: not-allowed;
        }

        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }

        .alert-error {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ef9a9a;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <i class="fas fa-shield-alt"></i>
                <h2>Acceso Autoridades</h2>
                <p>Seguridad Pública de Zaragoza, Puebla</p>
            </div>
            
            <div id="loginAlert" class="alert alert-error" style="display: none;">
                <i class="fas fa-exclamation-circle"></i>
                <span id="alertMessage" style="margin-left: 5px;"></span>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Correo Institucional</label>
                    <input type="email" class="form-control" id="email" required 
                           placeholder="oficial@zaragoza.gob.mx" autocomplete="off">
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Contraseña</label>
                    <div class="password-container">
                        <input type="password" class="form-control" id="password" required 
                               placeholder="Ingrese su contraseña">
                        <button type="button" id="btnVerPass" class="btn-eye" title="Mostrar/Ocultar contraseña">
                            <i class="fas fa-eye" id="iconoPass"></i>
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
                </button>
            </form>
            
            <div style="text-align: center; margin-top: 1rem; color: #999; font-size: 0.8rem;">
                <i class="fas fa-info-circle"></i> Solo personal autorizado
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputPass = document.getElementById('password');
            const btnVerPass = document.getElementById('btnVerPass');
            const iconoPass = document.getElementById('iconoPass');

            btnVerPass.addEventListener('click', () => {
                if (inputPass.type === 'password') {
                    inputPass.type = 'text';
                    iconoPass.classList.remove('fa-eye');
                    iconoPass.classList.add('fa-eye-slash');
                } else {
                    inputPass.type = 'password';
                    iconoPass.classList.remove('fa-eye-slash');
                    iconoPass.classList.add('fa-eye');
                }
            });
        });
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // Usamos la configuración de TU base de datos principal (connect-safe-7da2a)
        const firebaseConfig = {
            apiKey: "AIzaSyDq6oexUqr_LyHFvzqK01A8vlfOG3cwsoA",
            authDomain: "connect-safe-7da2a.firebaseapp.com",
            databaseURL: "https://connect-safe-7da2a-default-rtdb.firebaseio.com",
            projectId: "connect-safe-7da2a",
            storageBucket: "connect-safe-7da2a.firebasestorage.app",
            messagingSenderId: "956062646714",
            appId: "1:956062646714:web:f4e6c5b855107423c49d83"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Lógica de interfaz
        const loginForm = document.getElementById('loginForm');
        const alertDiv = document.getElementById('loginAlert');
        const alertMessage = document.getElementById('alertMessage');
        const loginBtn = document.getElementById('loginBtn');

        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            // Estado de carga
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verificando credenciales...';
            alertDiv.style.display = 'none';
            
            try {
                // Intento de conexión con Firebase Auth
                await signInWithEmailAndPassword(auth, email, password);
                
                // Si es exitoso
                loginBtn.innerHTML = '<i class="fas fa-check-circle"></i> Acceso Concedido';
                loginBtn.style.background = "#2e7d32"; // Color verde de éxito
                
                setTimeout(() => {
                    window.location.href = 'index.html'; 
                }, 1000);

            } catch (error) {
                console.error("Error de autenticación:", error.code);
                
                if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
                    alertMessage.textContent = 'Correo o contraseña incorrectos.';
                } else if (error.code === 'auth/too-many-requests') {
                    alertMessage.textContent = 'Demasiados intentos fallidos. Intente más tarde.';
                } else {
                    alertMessage.textContent = 'Error al conectar con el servidor de seguridad.';
                }
                
                alertDiv.style.display = 'flex';
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Iniciar Sesión';
                
                setTimeout(() => {
                    alertDiv.style.display = 'none';
                }, 4000);
            }
        });
    </script>
</body>
</html>
